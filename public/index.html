<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chisa · My Girlfriend</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="night-theme">
    <!-- Floating hearts background -->
    <div class="floating-hearts"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <i class="fas fa-water"></i>
                <h1>WUTHERING WAVES</h1>
            </div>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i></button>
                <button class="reset-btn" id="resetBtn"><i class="fas fa-redo-alt"></i></button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Avatar Section -->
            <div class="avatar-section">
                <div class="avatar-wrapper">
                    <div class="avatar-glow" id="avatarGlow"></div>
                    <div class="avatar-frame">
                        <div id="chisaAvatar" class="chisa-avatar"></div>
                    </div>
                    <div class="emotion-badge" id="emotionTag">gentle</div>
                </div>
                <h2 class="chisa-name">CHISA</h2>
                <div class="voice-indicator" id="voiceIndicator">
                    <span></span><span></span><span></span>
                </div>
                <div class="chisa-quote" id="chisaQuote">"I notice the small things about you..."</div>
            </div>

            <!-- Chat Section -->
            <div class="chat-section">
                <div class="messages-area" id="messagesArea">
                    <div class="message received">
                        <div class="message-sender">Chisa</div>
                        <div class="message-bubble">
                            🌊 The tide brought you to me, my love. I've been waiting~
                        </div>
                    </div>
                </div>

                <div class="typing-indicator" id="typingIndicator">
                    <span></span><span></span><span></span>
                    <span class="typing-text">Chisa is thinking...</span>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <i class="fas fa-heart input-icon"></i>
                        <input type="text" id="userInput" placeholder="Tell Chisa something..." autocomplete="off">
                        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div class="input-hint">
                        <i class="fas fa-chevron-up"></i>
                        <span>Your girlfriend is listening with love</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
